trigger: none

# Pilot pipeline for build-time R2R baking. Mirrors r2r.yml but bakes the
# test-assembly Crossgen2 step on the build agent (run-test-job) instead of
# on every Helix worker. Manual trigger only until validated against r2r.yml.

variables:
  - template: /eng/pipelines/common/variables.yml
  - template: /eng/pipelines/helix-platforms.yml

  # Crossgen2 dump-capture knobs for the build-time R2R bake step
  # (consumed by run-test-job.yml when buildTimeReadyToRun=true).
  # Override per-pipeline-run via the Variables UI when triaging:
  #   * BuildTimeR2RDumpType: 1 = Mini (~5-20MB, default; stack + modules),
  #                           2 = Heap (~100-500MB; adds private R/W memory),
  #                           3 = Triage, 4 = Full (~GBs).
  #   * BuildTimeR2RDumpKeepCount: max number of dumps retained per agent
  #     before the cull step deletes the rest. Bound chosen so worst-case
  #     capture stays within the ADO ~10GB pipeline-artifact recommendation
  #     even at Type=2.
  - name: BuildTimeR2RDumpType
    value: 1
  - name: BuildTimeR2RDumpKeepCount
    value: 10

extends:
  template:  /eng/pipelines/common/templates/pipeline-with-resources.yml
  parameters:
    stages:
    - stage: Build
      jobs:

      - template: /eng/pipelines/common/platform-matrix.yml
        parameters:
          jobTemplate: /eng/pipelines/common/global-build-job.yml
          buildConfig: checked
          platforms:
          - linux_arm
          - linux_arm64
          - linux_x64
          - osx_arm64
          - windows_arm64
          - windows_x64
          - windows_x86
          jobParameters:
            buildArgs: -s clr+libs -c $(_BuildConfig) -lc Release
            postBuildSteps:
              - template: /eng/pipelines/coreclr/templates/build-native-test-assets-step.yml
              - template: /eng/pipelines/common/upload-artifact-step.yml
                parameters:
                  rootFolder: $(Build.SourcesDirectory)/artifacts/bin
                  includeRootFolder: false
                  archiveType: $(archiveType)
                  archiveExtension: $(archiveExtension)
                  tarCompression: $(tarCompression)
                  artifactName: BuildArtifacts_$(osGroup)$(osSubgroup)_$(archType)_$(_BuildConfig)
                  displayName: Build Assets
            extraVariablesTemplates:
              - template: /eng/pipelines/common/templates/runtimes/native-test-assets-variables.yml
                parameters:
                  testGroup: outerloop

      - template: /eng/pipelines/common/platform-matrix.yml
        parameters:
          jobTemplate: /eng/pipelines/common/templates/runtimes/build-test-job.yml
          buildConfig: checked
          platforms:
          - CoreClrTestBuildHost # Either osx_x64 or linux_x64
          jobParameters:
            testGroup: outerloop

      - template: /eng/pipelines/common/platform-matrix.yml
        parameters:
          jobTemplate: /eng/pipelines/common/templates/runtimes/run-test-job.yml
          buildConfig: checked
          platforms:
          - linux_arm
          - linux_arm64
          - linux_x64
          - osx_arm64
          - windows_arm64
          - windows_x64
          - windows_x86
          helixQueueGroup: ci
          helixQueuesTemplate: /eng/pipelines/coreclr/templates/helix-queues-setup.yml
          jobParameters:
            testGroup: outerloop
            readyToRun: true
            buildTimeReadyToRun: true
            displayNameArgs: R2R_BuildTime
            liveLibrariesBuildConfig: Release
            unifiedArtifactsName: BuildArtifacts_$(osGroup)$(osSubgroup)_$(archType)_$(_BuildConfig)
